# Site
name: "PerfectSystem"
title: "PerfectSystem"
description: "Chmura i DevOps dla startupów — praktyczne przewodniki, narzędzia i strategie."
url: "https://blog.perfectsystem.pl"
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
baseurl: ""
disqus: 'demowebsite'
include: ["_pages"]
permalink: /:title/
lang: pl
audience_segment: startups

# SEO configuration
author:
  name: "PerfectSystem"
  twitter: "perfectsystem_pl"
twitter:
  username: "perfectsystem_pl"
  card: summary_large_image
social:
  links:
    - "https://twitter.com/perfectsystem_pl"
    - "https://linkedin.com/company/perfectsystem"

# Backlink CTA defaults
backlink_cta:
  text: "Potrzebujesz pomocy z migracją? Sprawdź ofertę Devopsity →"
  url: "https://devopsity.com/pl/uslugi/migracja-do-chmury/"

# Main sales page (for backlink validation)
main_sales_page: "https://devopsity.com"

# Authors
authors:
  george:
    name: George
    display_name: George
    avatar: 'assets/images/avatar.png'
    email: ""
    web: ""
    description: "Tech enthusiast and entrepreneur. Working with hosting and cloud systems for 20 years and counting."

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives

# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'

# Pagination 
paginate: 6
paginate_path: /page:num/

# Permalink patterns per content type
defaults:
  - scope:
      type: "posts"
    values:
      layout: post
      content_type: post
      permalink: "/:categories/:title/"
  - scope:
      path: "_landing"
    values:
      layout: landing
      content_type: landing
      permalink: "/:title/"
  - scope:
      path: "_products"
    values:
      layout: product
      content_type: product
      permalink: "/services/:title/"
  - scope:
      path: "_info"
    values:
      layout: info
      content_type: info
      permalink: "/info/:title/"

# Collections for non-post content types
collections:
  landing:
    output: true
  products:
    output: true
  info:
    output: true
  pillars:
    output: true

# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "disabled"
adsense-data-ad-client: "ca-pub-3412143450191416"
adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
