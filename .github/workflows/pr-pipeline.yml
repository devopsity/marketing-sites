# PR Pipeline — Detect changed sites, build, validate, deploy previews, post comment.
name: PR Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validate the site registry (sites.yml)
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate sites.yml
        run: |
          source scripts/pipeline-utils.sh
          validate_registry sites.yml

  # ---------------------------------------------------------------------------
  # 2. Detect which sites are affected by this PR
  # ---------------------------------------------------------------------------
  detect:
    name: Detect Changed Sites
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      affected_sites: ${{ steps.detect.outputs.affected_sites }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Detect affected sites
        id: detect
        run: |
          source scripts/pipeline-utils.sh
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
          AFFECTED=$(detect_changes sites.yml "$CHANGED_FILES")
          echo "affected_sites=$AFFECTED" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 3. Build & validate each affected site (matrix)
  # ---------------------------------------------------------------------------
  build-and-validate:
    name: build/${{ matrix.site.id }}
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.affected_sites != '[]'
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJSON(needs.detect.outputs.affected_sites) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Generate preview config
        run: |
          echo "baseurl: /pr-${{ github.event.pull_request.number }}" > _config_preview.yml

      - name: Build Jekyll site
        run: |
          bundle exec jekyll build \
            --source ${{ matrix.site.source_dir }} \
            --config ${{ matrix.site.source_dir }}/_config.yml,_config_preview.yml

      - name: HTML validation (${{ matrix.site.id }})
        run: |
          bundle exec htmlproofer ./_site \
            --checks Links,Images,Scripts \
            --disable-external \
            --swap-urls "^/pr-${{ github.event.pull_request.number }}:"

      - name: Link check (${{ matrix.site.id }})
        run: |
          bundle exec htmlproofer ./_site \
            --disable-external \
            --allow-hash-href \
            --swap-urls "^/pr-${{ github.event.pull_request.number }}:"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: SEO Validation
        run: bash scripts/seo-validate.sh ./_site/ ${{ matrix.site.id }}

      - name: GEO Validation
        run: bash scripts/geo-validate.sh ./_site/ ${{ matrix.site.id }}

      - name: Content Audit
        run: bash scripts/content-audit.sh keywords.yml ${{ matrix.site.source_dir }}

      - name: Upload SEO/GEO scorecards
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecards-${{ matrix.site.id }}
          path: |
            seo-scorecard.json
            geo-scorecard.json
            content-audit.json
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ matrix.site.id }}
          path: ./_site
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 4. Deploy preview for each affected site (matrix)
  # ---------------------------------------------------------------------------
  deploy-preview:
    name: deploy/${{ matrix.site.id }}
    runs-on: ubuntu-latest
    needs: [detect, build-and-validate]
    if: needs.detect.outputs.affected_sites != '[]'
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJSON(needs.detect.outputs.affected_sites) }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-${{ matrix.site.id }}
          path: ./_site

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Deploy to S3 preview bucket
        run: |
          aws s3 sync ./_site/ \
            s3://${{ matrix.site.preview_bucket }}/pr-${{ github.event.pull_request.number }}/ \
            --delete

  # ---------------------------------------------------------------------------
  # 5. Post / update PR comment with preview URLs
  # ---------------------------------------------------------------------------
  post-comment:
    name: Post Preview Comment
    runs-on: ubuntu-latest
    needs: [detect, deploy-preview]
    if: needs.detect.outputs.affected_sites != '[]'
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Post preview URLs comment
        uses: actions/github-script@v7
        env:
          AFFECTED_SITES: ${{ needs.detect.outputs.affected_sites }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const sites = JSON.parse(process.env.AFFECTED_SITES);
            const region = process.env.AWS_REGION;
            const prNumber = process.env.PR_NUMBER;

            let body = '## 🔍 Preview Deployments\n\n';
            body += '| Site | Preview URL |\n';
            body += '|------|-------------|\n';

            for (const site of sites) {
              const url = `http://${site.preview_bucket}.s3-website.${region}.amazonaws.com/pr-${prNumber}/`;
              body += `| ${site.id} | [${url}](${url}) |\n`;
            }

            body += '\n_Preview deployments are updated on every push to this PR._';

            // Find existing comment by this bot
            const marker = '## 🔍 Preview Deployments';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
