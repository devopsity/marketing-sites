# Site Registry — single source of truth for all sites in this repository.
# Workflows read this file dynamically; adding a new site requires no workflow changes.
sites:
  - id: perfectsystem
    source_dir: sites/perfectsystem
    domain: perfectsystem.pl
    lang: pl
    audience_segment: startups
    preview_bucket: perfectsystem-preview
    production_bucket: perfectsystem-prod
